<!DOCTYPE html>
<html id="html" lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="styles.css">
    <!-- <link rel="stylesheet" href="media_queries.css"> -->

    <link rel="icon" href="images/Icon.png" type="image/x-icon">

    <title>Vovursik</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Special+Elite&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header class="grid_item">
            <div class="header_center">
                <img src="images/Logo.png" alt=""></img>
            </div>
        </header>

        <nav class="grid_item">
            <div class="nav_center">
                <div class="nav_section">
                    <form action="">
                        <button>
                            <h3 class="text_left_anim">ABOUT</h3>
                        </button>
                    </form>
                </div>
                <div class="nav_section">
                    <form action="">
                        <button>
                            <h3 class="text_right_anim">PROJECTS</h3>
                        </button>
                    </form>
                </div>
            </div>
        </nav>

        <main class="grid_item">
            <div class="main_center">
                <div class="section_head">
                    <span class="section_num">01</span>
                    <h2 class="section_title"> projects</h2>
                    <span class="section_line"></span>
                </div>
                <div class="option_banner">
                    <form action="game_scene.html" method="GET" class="option_banner_card">
                        <button type="submit" name="chapter" value="0" class="option_banner_button">
                            <div class="option_banner_card_image">
                                <img src="Sprites/UI/Block.png" alt="form_block"></img>
                            </div>
                            <div class="option_banner_card_tags">
                                <span class="option_banner_card_eyebrow tag_game">GAME</span>
                                <span class="option_banner_card_eyebrow tag_blood">web</span>
                                <span class="option_banner_card_eyebrow tag_blood">in-progress</span>
                            </div>
                            <div class="option_banner_card_info">
                                <h2></h2>
                                <h1>secret project</h1>
                             </div>
                            <div class="option_banner_card_reveal">
                                <h1>secret project</h1>
                                <p>secret horror game</p>
                                <span class="reveal_link">show more...</span>
                            </div>
                        </button>
                    </form>
                    <form action="https://github.com/Vovursik/visual_crosshair_v" method="GET" class="option_banner_card">
                        <button type="submit" name="chapter" value="0" class="option_banner_button">
                            <div class="option_banner_card_image">
                                <img src="https://github.com/Vovursik/visual_crosshair_v/raw/main/icon.png" alt="form_block"></img>
                            </div>
                            <div class="option_banner_card_tags">
                                <span class="option_banner_card_eyebrow tag_program">APP</span>
                                <span class="option_banner_card_eyebrow">desktop</span>
                            </div>
                            <div class="option_banner_card_info">
                                <h2></h2>
                                <h1>Visual Crosshair V</h1>
                             </div>
                            <div class="option_banner_card_reveal">
                                <h1>Visual Crosshair V</h1>
                                <p>A tiny desktop app that draws a custom crosshair in the center of your screen</p>
                                <span class="reveal_link">show more...</span>
                            </div>
                        </button>
                    </form>
                    <form action="https://nicholasrothschild.itch.io/the-seeking-eye" method="GET" class="option_banner_card">
                        <button type="submit" name="chapter" value="0" class="option_banner_button">
                            <div class="option_banner_card_image">
                                <img src="https://img.itch.zone/aW1nLzIzOTQwMDI1LnBuZw==/315x250%23c/rOCIK%2B.png" alt="form_block"></img>
                            </div>
                            <div class="option_banner_card_tags">
                                <span class="option_banner_card_eyebrow tag_gold">GAMEJAM</span>
                                <span class="option_banner_card_eyebrow">itch.io</span>
                            </div>
                            <div class="option_banner_card_info">
                                <h2></h2>
                                <h1>THE SEEKING EYE</h1>
                             </div>
                            <div class="option_banner_card_reveal">
                                <h1>THE SEEKING EYE</h1>
                                <p>You are a mage, trapped in mysterious caves filled with monsters. Use your magic of Epiphany to reveal blocked paths, avoid dangers, and uncover the secrets of this dark place. Your vision is the key to survival in this perilous adventure</p>
                                <span class="reveal_link">show more...</span>
                            </div>
                        </button>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="menu.js"></script>
</body>
</html>
